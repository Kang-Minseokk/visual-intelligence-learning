# ============================================================
# 실험 3: CCT-14/256 + Stochastic Depth 0.1 (우선순위 1)
# ============================================================
# v1 결과(valid_top1=65.9%, gap=33.3%) 분석 후 개선 버전.
# 원인: transformer의 귀납적 편향 부재 → CNN 수준 정규화로 부족
#
# v1 대비 변경 사항:
#   stochastic_depth_rate: 0.0 → 0.1  [핵심 추가]
#     각 layer i의 drop_prob = (i/13) * 0.1
#     layer 0: 0.000,  layer 7: 0.054,  layer 13: 0.100
#     → DeiT, Swin 등 transformer 계열의 표준 정규화 기법
#   dropout:      0.1 → 0.2  (강화)
#   weight_decay: 0.05 → 0.1 (강화)
#   mixup_alpha:  0.2 → 0.4  (더 강한 mixing)
#
# 모델 구조: v1과 동일 (embed=256, depth=14, heads=4)
# ============================================================

seed: 42
output_dir: logs
data:
  root: ./data
  name: CIFAR100
  label_level: fine
  download: true
  num_workers: 4
  batch_size: 128
  k_train: -1
  randaugment_enable: true
  randaugment_num_ops: 2
  randaugment_magnitude: 9
model:
  name: cct
  embed_dim: 256
  depth: 14
  n_heads: 4
  mlp_ratio: 2.0
  dropout: 0.2
  attn_dropout: 0.0
  stochastic_depth_rate: 0.1
  n_conv_layers: 2
  num_classes: 100
  num_coarse_classes: 20
train:
  epochs: 300
  optimizer: adamw
  lr: 5e-4
  weight_decay: 0.1
  momentum: 0.9
  nesterov: false
  device: cuda
  log_interval: 235
  ckpt_interval: 1
  scheduler: cosine
  warmup_epochs: 10
  min_lr: 1e-5
  label_smoothing: 0.0
  mixup_alpha: 0.4
  lambda_coarse: 0.0
  superclass_smooth_alpha: 0.1
