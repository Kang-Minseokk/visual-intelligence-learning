seed: 42
output_dir: logs
data:
  root: ./data
  name: CIFAR100
  label_level: fine
  download: true
  num_workers: 4
  batch_size: 64
  k_train: -1
model:
  name: "wideresnet"
  hidden_features: 1024
  dropout: 0.3
  num_classes: 100
  depth: 2
  wrn_depth: 28
  widen_factor: 2
train:
  epochs: 100
  lr: 5e-4
  weight_decay: 5e-3
  device: cuda
  log_interval: 235
  ckpt_interval: 1
  momentum : 0.9
