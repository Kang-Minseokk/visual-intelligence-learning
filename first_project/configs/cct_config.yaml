seed: 42
output_dir: logs
data:
  root: ./data
  name: CIFAR100
  label_level: fine
  download: true
  num_workers: 4
  batch_size: 128
  k_train: -1
  randaugment_enable: false
  randaugment_num_ops: 2
  randaugment_magnitude: 9
model:
  name: "cct"
  num_classes: 100
  num_coarse_classes: 20
  dropout: 0.0
  emb_dropout: 0.0
  # CCT-7/3x1 (paper-style default)
  cct_embedding_dim: 256
  cct_transformer_layers: 7
  cct_transformer_heads: 4
  cct_mlp_ratio: 2.0
  cct_n_conv_layers: 1
  cct_kernel_size: 3
  cct_stride: 1
  cct_padding: 1
  cct_tokenizer_pooling_kernel_size: 3
  cct_tokenizer_pooling_stride: 2
  cct_tokenizer_pooling_padding: 1
train:
  epochs: 300
  optimizer: sgd
  lr: 1e-1
  weight_decay: 5e-4
  device: cuda
  log_interval: 235
  ckpt_interval: 1
  momentum: 0.9
  nesterov: true
  scheduler: cosine
  warmup_epochs: 5
  min_lr: 1e-5
  label_smoothing: 0.0
  mixup_alpha: 0.0
  lambda_coarse: 0.5
